services:
  # Backend API Service (Fallback if Docker runtime not available)
  # This requires Node.js to be available in Render's Python environment
  - type: web
    name: chatnalyxer-backend
    runtime: python
    plan: free
    buildCommand: |
      # Try to install Node.js if not present (this may not work on all environments)
      # First install WhatsApp dependencies
      cd whatsapp-integration
      npm install || echo "Warning: npm install failed for whatsapp-integration"
      cd ..
      # Then install Python dependencies
      cd chatnalyxer-backend
      pip install -r requirements.txt
    startCommand: cd chatnalyxer-backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: OTP_EXPIRY_MINUTES
        value: 5
      - key: OTP_MAX_ATTEMPTS
        value: 40
      - key: RATE_LIMIT_REQUESTS
        value: 60
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: 60
    healthCheckPath: /
